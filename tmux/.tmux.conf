set -g mouse on

bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
set -g history-limit 100000
setw -g mode-keys vi

# авто-вход в scroll mode при прокрутке вверх
bind -n WheelUpPane if-shell -F -t= "#{pane_in_mode}" "send-keys -M" "copy-mode -e"

# нормальное поведение вниз
bind -n WheelDownPane select-pane \; send-keys -M

# копирование без прыжка вниз — остаёмся в copy-mode
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# удобный выход
bind -T copy-mode-vi q send-keys -X cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# status bar footer - longer name
set -g status-left-length 100
set -g status-right-length 100
set -g status-interval 10
set -g window-status-format ""
set -g window-status-current-format ""
set -g status-right "CPU: #(top -l 1 | awk '/CPU usage/{idle=substr($7,1,length($7)-1); print int(100-idle)}')%% | RAM: #(vm_stat | awk '/page size of/ {size=$8} /Pages active/ {active=$3+0} /Pages wired down/ {wired=$4+0} /Pages occupied by compressor/ {comp=$5+0} END {cmd=\"sysctl -n hw.memsize\"; cmd | getline total; close(cmd); print int((active+wired+comp)*size/total*100)}')%% | PT: #(TZ=Europe/Lisbon date +%%H:%%M) | PL: #(TZ=Europe/Warsaw date +%%H:%%M)"
