set -g mouse on

bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
set -g history-limit 100000
setw -g mode-keys vi

# enter copy-mode on scroll up; pass through if already in mode
bind -n WheelUpPane if-shell -F -t= "#{pane_in_mode}" "send-keys -M" "copy-mode -e"
bind -n WheelDownPane select-pane \; send-keys -M

# prevent touchpad click-drag from triggering copy-mode; pass through if already in mode
bind -n MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "select-pane -t="

# copy without jumping to bottom — stay in copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# exit copy-mode
bind -T copy-mode-vi q send-keys -X cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# open vscode in current pane path
bind C-c run-shell "code #{pane_current_path}"

# re-run last printed line (e.g. `claude --resume <id>`)
bind C-g run-shell 'last=$(tmux capture-pane -p -S -200 -t #{pane_id} | grep "claude --resume" | tail -1 | sed "s/^[[:space:]]*//;s/[[:space:]]*$//"); tmux send-keys -t #{pane_id} "$last" Enter'

# resize panes with prefix + H/J/K/L
set -g repeat-time 1000
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# status bar
set -g status-left-length 100
set -g status-right-length 100
set -g status-interval 10
set -g window-status-format ""
set -g window-status-current-format ""
set -g status-left "[#{session_name}] win #{window_index} pane #{pane_index} [#{?client_prefix,prefix,#{?pane_in_mode,copy,normal}}] "
set -g status-right "PT: #(TZ=Europe/Lisbon date +%%H:%%M) | PL: #(TZ=Europe/Warsaw date +%%H:%%M)"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
